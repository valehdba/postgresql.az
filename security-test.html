async function test(label, url, method, body) {
  try {
    const opts = {method:method||'GET',headers:H};
    if(body) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    const t = await r.text();
    const d = t.length > 200 ? t.substring(0,200)+'...' : t;
    return label + ': [' + r.status + '] ' + d;
  } catch(e) { return label + ': ERROR ' + e.message; }
}
